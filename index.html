    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #1a1a26;
      --bg-nav: rgba(10, 10, 15, 0.92);
      --bg-sidebar: #0e0e16;
      --border: #1e1e2e;
      --border-hover: #2a2a3e;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --accent: #6366f1;
      --accent-dim: rgba(99, 102, 241, 0.12);
      --star: #eab308;
      --sidebar-w: 280px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Top nav */
    nav.top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-nav);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 16px;
    }

    .nav-brand {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-brand span { color: var(--accent); }

    .search-box {
      position: relative;
      max-width: 320px;
      width: 100%;
      margin-left: auto;
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text-dim); }

    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      width: 16px;
      height: 16px;
    }

    .search-kbd {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Mobile menu toggle */
    .menu-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      align-items: center;
      gap: 6px;
    }

    .menu-toggle svg {
      width: 16px;
      height: 16px;
    }

    /* Layout */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      min-height: calc(100vh - 56px);
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 16px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      text-decoration: none;
      color: inherit;
    }

    .sidebar-item:hover {
      background: var(--accent-dim);
    }

    .sidebar-item.active {
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }

    .sidebar-item-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.15s;
    }

    .sidebar-item.active .sidebar-item-name {
      color: var(--accent);
      font-weight: 600;
    }

    .sidebar-item:hover .sidebar-item-name {
      color: var(--text);
    }

    .sidebar-item-count {
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .sidebar-item-arrow {
      color: var(--text-dim);
      font-size: 14px;
      margin-left: 8px;
    }

    /* Content area */
    .content {
      flex: 1;
      min-width: 0;
      padding: 32px;
    }

    /* Bio */
    .bio {
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .bio p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .bio a {
      color: var(--accent);
      text-decoration: none;
    }

    .bio a:hover { text-decoration: underline; }

    /* Section header */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
    }

    .section-count {
      font-size: 14px;
      color: var(--text-dim);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-owner {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 400;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .card-stars {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-stars svg {
      width: 13px;
      height: 13px;
      color: var(--star);
      fill: var(--star);
    }

    .card-lang {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lang-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-mine {
      font-size: 10px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }

    /* Section divider */
    .section {
      margin-bottom: 48px;
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-size: 14px;
      display: none;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
    }

    footer p {
      font-size: 13px;
      color: var(--text-dim);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--text); }

    /* Mobile overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
    }

    .sidebar-overlay.open { display: block; }

    /* Responsive */
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .menu-toggle { display: flex; }
      .search-kbd { display: none; }

      .sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 280px;
        height: 100vh;
        z-index: 300;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border);
        transition: left 0.25s ease;
        padding-top: 20px;
      }

      .sidebar.open { left: 0; }

      .sidebar-close {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px 20px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }

      .sidebar-close-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .sidebar-close-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 20px;
        padding: 4px;
        line-height: 1;
      }

      .content {
        padding: 20px 16px;
      }

      .grid { grid-template-columns: 1fr; }

      .layout { display: block; }

      .section-title { font-size: 20px; }
    }

    @media (min-width: 769px) {
      .sidebar-close { display: none; }
    }

    /* Hidden by search */
    .section.hidden { display: none; }
    .sidebar-item.hidden { display: none; }
  </style>
</head>

      "Self-Hosted & Homelab", "Privacy & Security", "AI & LLM Tools",

    function formatStars(n) {
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
      return n.toString();
    }

    function slugify(s) {
      return s.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    }

    function renderCard(repo) {
      const langHTML = repo.lang
        ? `<span class="card-lang"><span class="lang-dot" style="background:${langColors[repo.lang] || '#888'}"></span>${repo.lang}</span>`
        : '';
      const mineHTML = repo.mine ? `<span class="badge-mine">MY PROJECT</span>` : '';
      return `
        <a class="card" href="https://github.com/${repo.owner}/${repo.name}" target="_blank" rel="noopener" data-name="${repo.name.toLowerCase()}" data-desc="${(repo.desc || '').toLowerCase()}" data-owner="${repo.owner.toLowerCase()}">
          <div class="card-header">
            <img class="card-icon" src="https://github.com/${repo.owner}.png?size=80" alt="${repo.owner}" loading="lazy">
            <div>
              <div class="card-name">${repo.name}${mineHTML}</div>
              <div class="card-owner">${repo.owner}</div>
            </div>
          </div>
          <div class="card-desc">${repo.desc || ''}</div>
          <div class="card-footer">
            <span class="card-stars">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              ${formatStars(repo.stars)}
            </span>
            ${langHTML}
          </div>
        </a>
      `;
    }

    function render() {
      const sectionsEl = document.getElementById('sections');
      const sidebarEl = document.getElementById('sidebar-items');
      let sectionsHTML = '';
      let sidebarHTML = '';

      for (const cat of categoryOrder) {
        const catRepos = repos.filter(r => r.cat === cat);
        if (catRepos.length === 0) continue;
        const slug = slugify(cat);
        const color = catColors[cat] || '#71717a';

        sidebarHTML += `
          <div class="sidebar-item" data-cat="${slug}">
            <div>
              <div class="sidebar-item-name" style="color: var(--text-muted)">${cat}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="sidebar-item-count">${catRepos.length}</span>
              <span class="sidebar-item-arrow">&#8250;</span>
            </div>
          </div>
        `;

        sectionsHTML += `
          <div class="section" id="${slug}" data-cat="${cat}">
            <div class="section-header">
              <div class="section-title" style="color:${color}">${cat}</div>
              <div class="section-count">${catRepos.length} projects</div>
            </div>
            <div class="grid">
              ${catRepos.map(renderCard).join('')}
            </div>
          </div>
        `;
      }

      sectionsEl.innerHTML = sectionsHTML;
      sidebarEl.innerHTML = sidebarHTML;
    }

    // Sidebar click to scroll
    function setupSidebar() {
      const sidebarEl = document.getElementById('sidebar-items');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');

      sidebarEl.addEventListener('click', (e) => {
        const item = e.target.closest('.sidebar-item');
        if (!item) return;
        const slug = item.dataset.cat;
        const el = document.getElementById(slug);
        if (el) {
          const offset = 80;
          const y = el.getBoundingClientRect().top + window.pageYOffset - offset;
          window.scrollTo({ top: y, behavior: 'smooth' });

          // Highlight active
          document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
          item.classList.add('active');

          // Close mobile sidebar
          sidebar.classList.remove('open');
          overlay.classList.remove('open');
        }
      });

      // Track scroll position to highlight sidebar
      const sections = () => document.querySelectorAll('.section');
      const sidebarItems = () => document.querySelectorAll('.sidebar-item');

      window.addEventListener('scroll', () => {
        const scrollY = window.scrollY + 120;
        let currentSlug = '';
        sections().forEach(s => {
          if (s.offsetTop <= scrollY) currentSlug = s.id;
        });
        sidebarItems().forEach(item => {
          item.classList.toggle('active', item.dataset.cat === currentSlug);
        });
      }, { passive: true });
    }

    // Mobile menu
    function setupMobileMenu() {
      const toggle = document.getElementById('menu-toggle');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const closeBtn = document.getElementById('sidebar-close');

      toggle.addEventListener('click', () => {
        sidebar.classList.add('open');
        overlay.classList.add('open');
      });

      overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      });

      closeBtn.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      });
    }

    // Search
    function setupSearch() {
      const input = document.getElementById('search');
      const noResults = document.getElementById('no-results');

      input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim();
        const sections = document.querySelectorAll('.section');
        const sidebarItems = document.querySelectorAll('.sidebar-item');
        let totalVisible = 0;

        sections.forEach((section, i) => {
          const cards = section.querySelectorAll('.card');
          let sectionVisible = 0;
          cards.forEach(card => {
            const match = !q || card.dataset.name.includes(q) || card.dataset.desc.includes(q) || card.dataset.owner.includes(q);
            card.style.display = match ? '' : 'none';
            if (match) sectionVisible++;
          });
          section.classList.toggle('hidden', sectionVisible === 0);
          if (sidebarItems[i]) sidebarItems[i].classList.toggle('hidden', sectionVisible === 0);
          totalVisible += sectionVisible;
        });

        noResults.style.display = totalVisible === 0 ? 'block' : 'none';
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== input) {
          e.preventDefault();
          input.focus();
        }
        if (e.key === 'Escape' && document.activeElement === input) {
          input.value = '';
          input.dispatchEvent(new Event('input'));
          input.blur();
        }
      });
    }

    render();
    setupSidebar();
    setupMobileMenu();
    setupSearch();
  </script>
</body>
</html>
